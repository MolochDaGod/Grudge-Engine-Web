<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="Grudge Engine - A powerful browser-based game development studio with 3D editing, AI tools, and cloud storage" />
    <meta property="og:title" content="Grudge Engine - Game Development Studio" />
    <meta property="og:description" content="Create 3D games in your browser with free AI assistance powered by Puter.js" />
    <meta property="og:type" content="website" />
    <title>Grudge Engine - Game Development Studio</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://js.puter.com/v2/"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0a0a0a;
        color: #fafafa;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        z-index: 9999;
      }
      #loading h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      #loading .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #333;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading">
        <h1>Grudge Engine</h1>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module">
      async function loadApp() {
        try {
          await import('./public/assets/index.js');
        } catch (e1) {
          try {
            await import('/assets/index.js');
          } catch (e2) {
            const loading = document.getElementById('loading');
            if (loading) {
              loading.innerHTML = `
                <h1 style="color: #3b82f6;">Grudge Engine</h1>
                <p style="color: #888; margin-top: 1rem; text-align: center;">
                  Loading app...<br>
                  <small>If this persists, run: npm run build</small>
                </p>
              `;
            }
          }
        }
      }
      loadApp();
    </script>
  </body>
</html>
